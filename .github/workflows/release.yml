name: Release

# Runs on every push to main. Compares CFBundleShortVersionString in
# Info.plist against existing git tags — if the version was bumped (no
# matching vX.Y.Z tag exists yet), builds, signs, notarizes, and publishes
# a GitHub release, creating the tag as part of publishing.
#
# Required repository secrets (Settings ▸ Secrets and variables ▸ Actions):
#   DEVELOPER_ID_CERT_P12   base64 of your "Developer ID Application" cert
#                           exported as .p12  (base64 -i cert.p12 | pbcopy)
#   DEVELOPER_ID_CERT_PASSWORD   password you set when exporting the .p12
#   NOTARY_APPLE_ID         Apple ID email used for notarization
#   NOTARY_TEAM_ID          10-char Team ID (e.g. 4TZUUASNPN)
#   NOTARY_PASSWORD         app-specific password for that Apple ID

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version bump
        id: version
        run: |
          set -euo pipefail

          VERSION=$(grep -A1 'CFBundleShortVersionString' Info.plist \
            | tail -1 \
            | sed -e 's/^[[:space:]]*<string>//' -e 's#</string>[[:space:]]*$##')

          if [ -z "$VERSION" ]; then
            echo "Could not read CFBundleShortVersionString from Info.plist" >&2
            exit 1
          fi

          TAG="v${VERSION}"
          echo "Info.plist version: $VERSION (tag: $TAG)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          if git rev-parse "$TAG" >/dev/null 2>&1 || git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            echo "Tag $TAG already exists — version not bumped, skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Import Developer ID certificate
        if: steps.version.outputs.should_release == 'true'
        env:
          CERT_P12: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

          echo "$CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN" -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

          # Make the temp keychain visible to codesign.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Build, sign, notarize, staple
        if: steps.version.outputs.should_release == 'true'
        env:
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
        run: make release

      - name: Publish GitHub release
        if: steps.version.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: Dooodle.dmg
          generate_release_notes: true
